<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ request.app.title }} - Wisenotes</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
  <link rel="stylesheet" href="/static/css/style.css?v=15">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"></script>
  <script src="/static/js/init-layout.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
  <script nonce="{{ request.state.csp_nonce }}">
    // Accessibility keybindings exposed to client JS
    window.WISENOTES_ACCESSIBILITY = {{ accessibility|tojson | safe }};
    console.log('[inline] WISENOTES_ACCESSIBILITY', window.WISENOTES_ACCESSIBILITY);
  </script>
  <script type="module" src="/static/js/app.js?v=16" defer></script>
</head>
<body class="page">
  <header class="topbar">
    <div class="brand">Wisenotes</div>
    <nav class="actions">
      <div class="toolbar-control">
        <label for="editor-mode-select">Editor Mode</label>
        <select id="editor-mode-select" class="toolbar-select">
          <option value="graphical">JSON Editor</option>
          <option value="json">Raw Code</option>
          <option value="graphical-2">Graphical Editor</option>
        </select>
      </div>
      <button
        class="icon-btn settings-btn"
        title="Settings"
        aria-label="Settings"
        hx-get="/settings"
        hx-target="body"
        hx-swap="beforeend"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m-3.08-3.08l4.24-4.24M19.78 19.78l-4.24-4.24m-3.08-3.08l-4.24-4.24"></path>
        </svg>
      </button>
    </nav>
  </header>
  <main class="layout">
    {% block content %}{% endblock %}
  </main>
  <div id="htmx-dummy" style="display:none;"></div>
</body>
</html>
