<div id="media-browser-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10000; overflow: auto;" onclick="if(event.target.id === 'media-browser-modal') closeMediaBrowser();">
  <div style="background: white; margin: 40px auto; padding: 24px; border-radius: 8px; max-width: 800px; width: 90%;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="margin: 0;">Select or Upload Media</h2>
      <button type="button" onclick="closeMediaBrowser()" style="background: none; border: none; font-size: 24px; cursor: pointer;">×</button>
    </div>

    <!-- Upload Section -->
    <div style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid #eee;">
      <h3 style="margin: 0 0 12px 0; font-size: 14px; color: #666; text-transform: uppercase;">Upload New Media</h3>
      <div id="media-upload-drop-zone"
           style="border: 2px dashed #ccc; padding: 24px; border-radius: 4px; text-align: center; cursor: pointer; transition: all 0.2s;">
        <p style="margin: 0; color: #666;">Click or drag files here</p>
        <input type="file" id="media-upload-input" class="media-file-input" accept="image/*" multiple style="display: none;">
      </div>
      <div id="upload-progress" style="display: none; margin-top: 12px;">
        <div style="height: 4px; background: #eee; border-radius: 2px; overflow: hidden;">
          <div id="progress-bar" style="height: 100%; background: #4CAF50; width: 0%; transition: width 0.3s;"></div>
        </div>
      </div>
    </div>

    <!-- Gallery Section -->
    <div>
      <h3 style="margin: 0 0 12px 0; font-size: 14px; color: #666; text-transform: uppercase;">Available Media</h3>
      <div id="media-browser-gallery" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px;">
        <p style="grid-column: 1 / -1; color: #999; text-align: center;">Loading media...</p>
      </div>
    </div>

    <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 8px;">
      <button type="button" class="btn ghost" onclick="closeMediaBrowser()">Cancel</button>
    </div>
  </div>
</div>
