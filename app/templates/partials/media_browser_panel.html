<div id="media-browser-panel" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: flex; align-items: center; justify-content: center;">
  <div style="background: white; padding: 24px; border-radius: 8px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="margin: 0;">Select or Upload Media</h2>
      <button type="button" class="btn ghost" 
              hx-target="#media-browser-panel"
              hx-swap="delete"
              style="background: none; border: none; font-size: 24px; cursor: pointer; padding: 0; width: auto; appearance: none;">
        ×
      </button>
    </div>

    <!-- Upload Section -->
    <div style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid #eee;">
      <h3 style="margin: 0 0 12px 0; font-size: 14px; color: #666; text-transform: uppercase;">Upload New Media</h3>
      <form hx-post="/notes/{{ active.id }}/media/upload"
            hx-target="#media-gallery"
            enctype="multipart/form-data"
            style="border: 2px dashed #ccc; padding: 24px; border-radius: 4px; text-align: center;">
        <p style="margin: 0 0 12px 0; color: #666;">Select image file:</p>
        <input type="file" name="file" accept="image/*" required style="display: block; margin: 0 auto;">
        <button type="submit" class="btn" style="margin-top: 12px;">Upload</button>
      </form>
    </div>

    <!-- Gallery Section -->
    <div>
      <h3 style="margin: 0 0 12px 0; font-size: 14px; color: #666; text-transform: uppercase;">Available Media</h3>
      <div id="media-gallery" 
           style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; min-height: 120px;">
        <!-- Gallery will load here -->
        {% include "partials/media_gallery.html" %}
      </div>
    </div>
  </div>
</div>
