<div class="note-settings-overlay" id="note-settings">
  <div class="note-settings-panel">
    <div class="note-settings-header">
      <h3>Settings</h3>
      <button class="btn icon-btn" aria-label="Close settings" data-close-settings>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="note-settings-body">
      <div class="note-settings-section">
        <strong>Title</strong>
        <div class="field" style="margin-top:8px; display:flex; gap:8px; align-items:center;">
          <form hx-post="/notes/{{ note.id }}/title" hx-target="body" hx-swap="none" style="display:flex; gap:8px; width:100%;">
            <input name="title" value="{{ note.title }}" placeholder="Note title" style="flex:1; padding:8px; border-radius:6px; border:1px solid var(--border); background:#0b1220; color:var(--text);" />
            <button type="submit" class="btn">Save</button>
          </form>
        </div>
      </div>

      <div class="note-settings-section">
        <strong>Folder</strong>
        <div class="field" style="margin-top:8px; display:flex; gap:8px; align-items:center;">
          <form hx-post="/notes/{{ note.id }}/folder" hx-target="body" hx-swap="none" style="display:flex; gap:8px; width:100%;">
            <input name="folder" value="{{ note.folder or '' }}" placeholder="No folder (ungrouped)" style="flex:1; padding:8px; border-radius:6px; border:1px solid var(--border); background:#0b1220; color:var(--text);" list="existing-folders" />
            <datalist id="existing-folders">
              {% for f in existing_folders %}
                <option value="{{ f }}">
              {% endfor %}
            </datalist>
            <button type="submit" class="btn">Save</button>
          </form>
        </div>
        <p class="muted" style="margin-top:4px; font-size:12px;">Group notes by assigning them to a folder. Leave empty to ungroup.</p>
      </div>

      <div class="note-settings-section">
        <strong>Language</strong>
        <div class="field" style="margin-top:8px;">
          <label for="text-language">Text language for paragraphs</label>
          <select id="text-language">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
            <option value="nl">Nederlands</option>
            <option value="sv">Svenska</option>
            <option value="da">Dansk</option>
            <option value="no">Norsk</option>
            <option value="fi">Suomi</option>
            <option value="pl">Polski</option>
            <option value="ru">Русский</option>
            <option value="uk">Українська</option>
            <option value="tr">Türkçe</option>
            <option value="ar">العربية</option>
            <option value="he">עברית</option>
            <option value="hi">हिन्दी</option>
            <option value="bn">বাংলা</option>
            <option value="ta">தமிழ்</option>
            <option value="te">తెలుగు</option>
            <option value="zh">中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
          </select>
        </div>
      </div>

      <div class="note-settings-section">
        <strong>Graphics</strong>
        <div style="margin-top:8px; display:flex; gap:16px; align-items:center;">
          <label><input type="radio" name="editor-mode-setting" value="graphical"> Graphical editor</label>
          <label><input type="radio" name="editor-mode-setting" value="json"> JSON editor</label>
        </div>
      </div>

      <div class="note-settings-section">
        <strong>Export</strong>
        <div style="margin-top:8px; display:flex; gap:8px; align-items:center;">
          <a class="btn" href="/api/export" download>Download JSON</a>
        </div>
      </div>

      <div class="note-settings-section">
        <strong class="danger-text">Delete</strong>
        <div style="margin-top:8px; display:flex; gap:8px; align-items:center; justify-content:space-between;">
          <p class="muted">Permanently delete this note and its chapters.</p>
          <form hx-delete="/notes/{{ note.id }}" hx-target="body" hx-swap="none" data-confirm="Delete this note?">
            <button type="submit" class="btn danger">Delete Note</button>
          </form>
        </div>
      </div>
    </div>
    <div class="note-settings-actions">
      <div class="muted">Settings are saved locally and apply immediately.</div>
      <button class="btn" data-close-settings>Close</button>
    </div>
  </div>
</div>
