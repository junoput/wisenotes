{# Display template for media blocks #}
<div class="block-content media-block-display">
  {% if chapter.content %}
    <img src="{{ chapter.content }}" alt="{{ chapter.title or 'Media' }}" style="max-width: 100%; max-height: 400px; border-radius: 4px;">
    {% if chapter.title %}
      <p style="margin-top: 8px; font-size: 0.9em; color: #666;">{{ chapter.title }}</p>
    {% endif %}
  {% else %}
    <div class="media-drop-zone"
         data-note-id="{{ note_id }}"
         data-chapter-id="{{ chapter.id }}">
      <div class="media-drop-zone-icon">&#128247;</div>
      <div class="media-drop-zone-text">Drop an image here</div>
      <div class="media-drop-zone-hint">or click to edit and upload</div>
    </div>
  {% endif %}
</div>
