{# Edit template for media blocks #}
<input type="hidden" name="language" value="">

<div class="field">
  <label for="title-{{ chapter.id }}">Title / Caption</label>
  <input type="text" id="title-media-{{ chapter.id }}" name="title" value="{{ chapter.title }}" placeholder="Image caption (optional)">
</div>

<div class="field">
  <label for="source-media-{{ chapter.id }}">Source / Credit</label>
  <input type="text" id="source-media-{{ chapter.id }}" name="source" value="{{ chapter.source or '' }}" placeholder="Image source or credit">
</div>

<div class="field">
  {% if chapter.content %}
    <label>Image Preview</label>
    <div id="media-preview-{{ chapter.id }}" style="position: relative; width: fit-content; background: transparent; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: visible; margin-bottom: 8px;">
      <img src="{{ chapter.content }}" alt="preview" style="width: auto; height: auto; max-width: 100%; max-height: 400px; object-fit: contain;">
      <button type="button"
              class="media-edit-btn"
              onclick="openImageEditor('{{ chapter.content }}', '{{ note_id }}', '{{ chapter.id }}')"
              title="Edit image"
              style="position: absolute; top: 4px; right: 4px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>
  {% else %}
    <div class="media-drop-zone media-drop-zone-edit"
         data-note-id="{{ note_id }}"
         data-chapter-id="{{ chapter.id }}">
      <div class="media-drop-zone-icon">&#128247;</div>
      <div class="media-drop-zone-text">Drop an image here</div>
      <div class="media-drop-zone-hint">or use the gallery below</div>
    </div>
  {% endif %}
  <input type="hidden" id="content-{{ chapter.id }}" name="content_text" value="{{ chapter.content or '' }}">
  <div id="media-picker-container-{{ chapter.id }}"
       hx-get="/notes/{{ note_id }}/chapters/{{ chapter.id }}/media/picker"
       hx-trigger="load"
       hx-target="#media-picker-container-{{ chapter.id }}"
       hx-swap="innerHTML"
       style="margin-top: 8px;">
    <div style="padding: 12px; background: #f0f0f0; border-radius: 4px; text-align: center; color: #666;">Loading media gallery...</div>
  </div>
</div>
